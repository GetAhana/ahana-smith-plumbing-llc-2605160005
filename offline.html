<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
  <title>Offline | Smith Plumbing</title>
  <meta name="robots" content="noindex" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--p:#2563EB;--d:#0f1114;--l:#f5f6f8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--l);color:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    h1{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:clamp(1.75rem,4vw,2.5rem)}
    p{margin-top:1rem;color:#555;max-width:420px;line-height:1.65}
    a{display:inline-block;margin-top:1.75rem;background:var(--p);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;padding:.75rem 1.5rem;border-radius:8px;text-decoration:none}
    a[href^="tel"]{margin-left:.5rem;background:var(--d)}
  </style>
</head>
<body>
  <h1>You’re offline</h1>
  <p>Smith Plumbing is temporarily offline. Call (602) 555-0142 for emergency service.</p>
  <div>
    <a href="index.html">Try again</a>
    <a href="tel:+16025550142">Call (602) 555-0142</a>
  </div>
  <script src="./main.js" defer></script>
</body>
</html>
